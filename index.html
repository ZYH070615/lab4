<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D Gradient Cube - Corrected Position</title>
    <style>
        /* 全局居中 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f7f7f7;
            margin: 0;
            font-family: sans-serif;
        }

        /* 3D 立方体容器 */
        .cube-container {
            position: relative;
            /* 我们将在这个位置周围组装立方体，边长统一使用 100px */
            width: 100px;
            height: 100px;
        }

        /* 所有面的共同样式 */
        .face {
            position: absolute;
            width: 100px; /* 立方体基准边长 */
            height: 100px;
            box-sizing: border-box;
        }

        /* 1. 正面 (Front): 标准正方形，不需要倾斜，它是对齐的基准 */
        .front {
            background: linear-gradient(135deg, #3498db, #2980b9); /* 蓝色渐变 */
            z-index: 3; /* 放在最前面 */
        }

        /* 2. 顶面 (Top): 亮蓝色渐变 */
        .top {
            background: linear-gradient(135deg, #aed6f1, #5dade2); /* 亮蓝，模拟上方光线 */
            /* 为了获得更好的 3D 视觉效果，我们将顶面的高度压缩为一半 */
            height: 50px; 
            /* --- 核心修正：精准定位 --- */
            /* 1. 先 skewX(-45deg)，顶边偏向左边。
               2. **translate(25px, -50px)**：
                  - translateY(-50px) 将其整体放到正面正上方。
                  - translateX(25px) 非常关键。-45度的 skewX 导致顶边向左移动了一个自身高度的距离（这里是50px）。为了让其底边与正面的顶边完全对齐，我们需要把它向右拉回一个距离，即斜面压缩高度的一半（50 / 2 = 25px）。
            */
            transform: skewX(-45deg) translate(25px, -50px);
            z-index: 2;
        }

        /* 3. 右侧面 (Right): 暗蓝色渐变 */
        .right {
            background: linear-gradient(135deg, #2e86c1, #1b4f72); /* 暗蓝，模拟背光 */
            /* 将侧面的宽度也压缩为一半 */
            width: 50px;
            /* --- 核心修正：精准定位 --- */
            /* 1. skewY(-45deg)，远端（右下角）会向下翘起。
               2. **translate(100px, 25px)**：
                  - translateX(100px) 将其整体移动到正面的正右侧。
                  - translateY(25px) 非常关键。-45度的 skewY 导致其右边向下倾斜。为了让其左边与正面的右边完全对齐，我们需要把整个面向上拉回一个距离，即侧面压缩宽度的一半（50 / 2 = 25px）。
            */
            transform: skewY(-45deg) translate(100px, 25px);
            z-index: 1; /* 最底面 */
        }
    </style>
</head>
<body>

    <div class="cube-container">
        <div class="face top"></div>
        <div class="face right"></div>
        <div class="face front"></div>
    </div>

</body>
</html>
