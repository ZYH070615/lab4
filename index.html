<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D渐变立方体</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f0f0f0;
            perspective: 1000px;
        }
        
        .scene {
            width: 200px;
            height: 200px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 10s infinite linear;
        }
        
        @keyframes rotate {
            from { transform: rotateX(0) rotateY(0); }
            to { transform: rotateX(360deg) rotateY(360deg); }
        }
        
        .cube {
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
        }
        
        .face {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 2px solid #333;
            opacity: 0.9;
        }
        
        /* 正面 */
        .front {
            background: linear-gradient(45deg, #ff6b6b, #ffa500);
            transform: translateZ(100px);
        }
        
        /* 后面 */
        .back {
            background: linear-gradient(45deg, #ffa500, #ffd700);
            transform: rotateY(180deg) translateZ(100px);
        }
        
        /* 顶部 */
        .top {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            transform: rotateX(90deg) translateZ(100px);
        }
        
        /* 底部 */
        .bottom {
            background: linear-gradient(45deg, #45b7d1, #96c93d);
            transform: rotateX(-90deg) translateZ(100px);
        }
        
        /* 左侧 */
        .left {
            background: linear-gradient(45deg, #9b59b6, #e74c3c);
            transform: rotateY(-90deg) translateZ(100px);
        }
        
        /* 右侧 */
        .right {
            background: linear-gradient(45deg, #3498db, #2ecc71);
            transform: rotateY(90deg) translateZ(100px);
        }
        
        /* 使用skew变换增强3D效果 */
        .cube-skewed {
            position: relative;
            width: 200px;
            height: 200px;
            margin-top: 200px;
        }
        
        .skewed-face {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 2px solid #333;
            opacity: 0.9;
        }
        
        .skewed-front {
            background: linear-gradient(45deg, #ff6b6b, #ffa500);
            transform: translate(0, 0) skewX(0deg) skewY(0deg);
        }
        
        .skewed-side {
            background: linear-gradient(45deg, #3498db, #2ecc71);
            transform: translate(75px, -40px) skewX(-30deg) skewY(0deg);
        }
        
        .skewed-top {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            transform: translate(37.5px, -75px) skewX(30deg) skewY(0deg);
        }
        
        .skewed-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-top: 100px;
        }
    </style>
</head>
<body>
    <div>
        <!-- 3D立方体 - 使用真正的3D变换 -->
        <h2>3D立方体 (使用3D变换)</h2>
        <div class="scene">
            <div class="cube">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
                <div class="face left"></div>
                <div class="face right"></div>
            </div>
        </div>
        
        <!-- 使用skew和translate模拟的3D立方体 -->
        <h2>使用skew和translate模拟的3D立方体</h2>
        <div class="skewed-container">
            <div class="skewed-face skewed-front"></div>
            <div class="skewed-face skewed-side"></div>
            <div class="skewed-face skewed-top"></div>
        </div>
    </div>
</body>
</html>
