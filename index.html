<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D Gradient Cube</title>
    <style>
        /* 页面居中显示 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
        }

        /* 立方体容器 */
        .cube-container {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .face {
            position: absolute;
            width: 100px;
            height: 100px;
        }

        /* 正面：标准正方形 */
        .front {
            background: linear-gradient(135deg, #3498db, #2980b9);
            z-index: 3;
        }

        /* 顶面：通过 skewX 倾斜并平移 */
        .top {
            background: linear-gradient(135deg, #5dade2, #3498db);
            height: 50px; /* 压缩高度以产生透视感 */
            transform: skewX(-45deg) translate(25px, -50px);
            z-index: 2;
        }

        /* 右侧面：通过 skewY 倾斜并平移 */
        .right {
            background: linear-gradient(135deg, #2e86c1, #1b4f72);
            width: 50px; /* 压缩宽度以产生透视感 */
            transform: skewY(-45deg) translate(100px, 25px);
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="cube-container">
        <div class="face top"></div>
        <div class="face right"></div>
        <div class="face front"></div>
    </div>

</body>
</html>
